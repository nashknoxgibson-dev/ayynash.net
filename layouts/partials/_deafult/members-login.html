{{ define "main" }}
  <main class="main">
    <div class="container">
      <h1>{{ .Title }}</h1>
      <form method="POST" action="/members-login">
        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" required>
        <button type="submit">Enter</button>
      </form>
    </div>
  </main>
{{ end }}
