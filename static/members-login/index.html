<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Members Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0d12;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 24px;
      background: #151922;
      border: 1px solid #2a3140;
      border-radius: 12px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 28px;
    }
    label {
      display: block;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #3a4355;
      border-radius: 8px;
      background: #0f131b;
      color: #fff;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      background: #ffffff;
      color: #000;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Members Login</h1>
    <form method="POST" action="/members-login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
